<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CURE-LOCK | Global Leaderboard</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --neon-blue:#00d4ff; --neon-green:#00ff88; --neon-red:#ff2244;
  --neon-yellow:#ffdd00; --neon-orange:#ff8c00;
  --bg-dark:#020811; --bg-card:rgba(0,20,40,0.75);
  --panel-border:rgba(0,212,255,0.18); --text-dim:rgba(0,212,255,0.45);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg-dark);color:var(--neon-blue);font-family:'Rajdhani',sans-serif;min-height:100vh;overflow-x:hidden;}
#matrix-canvas{position:fixed;top:0;left:0;width:100%;height:100%;opacity:0.05;z-index:0;pointer-events:none;}
.scanlines{position:fixed;top:0;left:0;width:100%;height:100%;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.12) 2px,rgba(0,0,0,0.12) 4px);z-index:1;pointer-events:none;}
.content{position:relative;z-index:2;max-width:1000px;margin:0 auto;padding:30px 20px;}

header{display:flex;justify-content:space-between;align-items:center;margin-bottom:40px;padding-bottom:20px;border-bottom:1px solid var(--panel-border);}
.logo{font-family:'Orbitron',sans-serif;font-size:22px;font-weight:900;letter-spacing:6px;text-shadow:0 0 15px var(--neon-blue);}
.logo span{color:var(--neon-red);}
.back-btn{font-family:'Orbitron',sans-serif;font-size:10px;font-weight:700;letter-spacing:3px;padding:10px 20px;border:1px solid var(--panel-border);background:transparent;color:var(--text-dim);cursor:pointer;text-decoration:none;transition:all 0.3s;}
.back-btn:hover{border-color:var(--neon-blue);color:var(--neon-blue);}

.page-title{text-align:center;margin-bottom:30px;}
.page-title h1{font-family:'Orbitron',sans-serif;font-size:clamp(20px,4vw,32px);font-weight:900;letter-spacing:6px;margin-bottom:6px;}
.page-title p{font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:3px;color:var(--text-dim);}
.live-dot{display:inline-block;width:8px;height:8px;background:var(--neon-green);border-radius:50%;animation:blink 1s infinite;margin-right:6px;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:30px;}
.stat-card{background:var(--bg-card);border:1px solid var(--panel-border);border-radius:3px;padding:20px;text-align:center;position:relative;overflow:hidden;}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--neon-blue),transparent);}
.stat-card-val{font-family:'Orbitron',sans-serif;font-size:28px;font-weight:900;display:block;margin-bottom:4px;}
.stat-card-lbl{font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--text-dim);}

.table-wrap{background:var(--bg-card);border:1px solid var(--panel-border);border-radius:3px;overflow:hidden;position:relative;}
.table-wrap::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--neon-blue),transparent);}
.table-head{padding:14px 20px;border-bottom:1px solid var(--panel-border);display:flex;justify-content:space-between;align-items:center;}
.table-head-title{font-family:'Orbitron',sans-serif;font-size:11px;font-weight:700;letter-spacing:3px;color:var(--neon-green);}
.refresh-btn{font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--text-dim);background:transparent;border:1px solid var(--panel-border);padding:6px 12px;cursor:pointer;transition:all 0.3s;}
.refresh-btn:hover{color:var(--neon-blue);border-color:var(--neon-blue);}

table{width:100%;border-collapse:collapse;}
thead tr{border-bottom:1px solid var(--panel-border);}
th{font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--text-dim);padding:12px 16px;text-align:left;font-weight:normal;}
th:last-child,td:last-child{text-align:right;}
th:nth-child(3),td:nth-child(3),th:nth-child(4),td:nth-child(4){text-align:center;}

tbody tr{border-bottom:1px solid rgba(0,212,255,0.06);transition:background 0.2s;}
tbody tr:hover{background:rgba(0,212,255,0.03);}
tbody tr.top-1{background:rgba(255,221,0,0.03);}
tbody tr.top-2{background:rgba(192,192,192,0.03);}
tbody tr.top-3{background:rgba(205,127,50,0.03);}
td{font-family:'Rajdhani',sans-serif;font-size:14px;padding:14px 16px;color:rgba(0,212,255,0.8);}

.rank-badge{font-family:'Orbitron',sans-serif;font-size:12px;font-weight:900;width:28px;height:28px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;border:1px solid rgba(0,212,255,0.2);color:var(--text-dim);}
.rank-badge.r1{border-color:#ffd700;color:#ffd700;box-shadow:0 0 10px rgba(255,215,0,0.3);background:rgba(255,215,0,0.05);}
.rank-badge.r2{border-color:#c0c0c0;color:#c0c0c0;box-shadow:0 0 8px rgba(192,192,192,0.2);}
.rank-badge.r3{border-color:#cd7f32;color:#cd7f32;box-shadow:0 0 8px rgba(205,127,50,0.2);}

.team-name-cell{font-family:'Orbitron',sans-serif;font-size:12px;font-weight:700;color:#fff;}
.school-name{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--text-dim);margin-top:2px;}
.score-cell{font-family:'Orbitron',sans-serif;font-size:14px;font-weight:700;color:var(--neon-green);text-shadow:0 0 8px rgba(0,255,136,0.3);}
.time-cell{font-family:'Share Tech Mono',monospace;font-size:12px;}
.time-cell.good{color:var(--neon-green);}
.time-cell.ok{color:var(--neon-orange);}
.time-cell.bad{color:var(--neon-red);}
.hints-cell{font-family:'Share Tech Mono',monospace;font-size:12px;}
.status-badge{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:2px;padding:3px 8px;border-radius:2px;}
.status-badge.complete{color:var(--neon-green);background:rgba(0,255,136,0.08);border:1px solid rgba(0,255,136,0.2);}
.status-badge.active{color:var(--neon-blue);background:rgba(0,212,255,0.08);border:1px solid rgba(0,212,255,0.2);animation:blink 2s infinite;}
.status-badge.failed{color:var(--neon-red);background:rgba(255,34,68,0.05);border:1px solid rgba(255,34,68,0.15);}
.empty-state{padding:60px;text-align:center;font-family:'Share Tech Mono',monospace;font-size:13px;color:var(--text-dim);letter-spacing:2px;}

.corner{position:absolute;width:12px;height:12px;border-color:var(--neon-blue);border-style:solid;}
.corner-tl{top:6px;left:6px;border-width:1px 0 0 1px;}
.corner-tr{top:6px;right:6px;border-width:1px 1px 0 0;}
.corner-bl{bottom:6px;left:6px;border-width:0 0 1px 1px;}
.corner-br{bottom:6px;right:6px;border-width:0 1px 1px 0;}

@media(max-width:700px){
  .stats-row{grid-template-columns:1fr;}
  th:nth-child(4),td:nth-child(4),th:nth-child(5),td:nth-child(5){display:none;}
}
</style>
</head>
<body>
<canvas id="matrix-canvas"></canvas>
<div class="scanlines"></div>
<div class="content">
  <header>
    <div class="logo">CURE<span>-</span>LOCK</div>
    <a href="index.html" class="back-btn">← MISSION BRIEFING</a>
  </header>

  <div class="page-title">
    <h1>GLOBAL LEADERBOARD</h1>
    <p><span class="live-dot"></span>LIVE RANKINGS — SENTINEL PERFORMANCE INDEX</p>
  </div>

  <div class="stats-row">
    <div class="stat-card">
      <div class="corner corner-tl"></div><div class="corner corner-br"></div>
      <span class="stat-card-val" style="color:var(--neon-green)" id="statTeams">0</span>
      <span class="stat-card-lbl">TEAMS REGISTERED</span>
    </div>
    <div class="stat-card">
      <div class="corner corner-tl"></div><div class="corner corner-br"></div>
      <span class="stat-card-val" style="color:var(--neon-blue)" id="statComplete">0</span>
      <span class="stat-card-lbl">MISSIONS COMPLETE</span>
    </div>
    <div class="stat-card">
      <div class="corner corner-tl"></div><div class="corner corner-br"></div>
      <span class="stat-card-val" style="color:var(--neon-yellow)" id="statTop">—</span>
      <span class="stat-card-lbl">TOP SCORE</span>
    </div>
  </div>

  <div class="table-wrap">
    <div class="table-head">
      <div class="table-head-title">▸ SENTINEL RANKINGS</div>
      <button class="refresh-btn" onclick="manualRefresh()">↻ REFRESH</button>
    </div>
    <div id="tableContainer">
      <div class="empty-state">CONNECTING TO FIRESTORE...<br><br>LOADING LIVE DATA</div>
    </div>
  </div>
</div>

<script type="module">
// ── Firebase ──────────────────────────────────────────────────
import { initializeApp }   from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, onSnapshot, query, orderBy, getDocs }
                            from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// 🔥 PASTE YOUR CONFIG HERE
const firebaseConfig = {
  apiKey: "AIzaSyALDA8Ml23lZnUaiDTZF2AaZC2gnjx4-8I",
  authDomain: "cyber-rescue-ops.firebaseapp.com",
  projectId: "cyber-rescue-ops",
  storageBucket: "cyber-rescue-ops.firebasestorage.app",
  messagingSenderId: "12878094017",
  appId: "1:12878094017:web:e1caf6bd006beeb49a7e40"
};
const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

// ── Matrix ────────────────────────────────────────────────────
const canvas=document.getElementById('matrix-canvas');
const ctx=canvas.getContext('2d');
canvas.width=window.innerWidth; canvas.height=window.innerHeight;
const cols=Math.floor(canvas.width/16); const drops=Array(cols).fill(1);
const chars='01アイウ@#$ABCDEFGHIJKLMNOPQRSTUVWXYZ';
function drawMatrix(){
  ctx.fillStyle='rgba(2,8,17,0.05)';ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle='rgba(0,212,255,0.6)';ctx.font='13px Share Tech Mono';
  drops.forEach((y,i)=>{ctx.fillText(chars[Math.floor(Math.random()*chars.length)],i*16,y*16);if(y*16>canvas.height&&Math.random()>0.975)drops[i]=0;drops[i]++;});
}
setInterval(drawMatrix,60);

function fmtTime(secs){
  const m=Math.floor(secs/60); const s=secs%60;
  return String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
}
function timeClass(secs){ if(secs>900)return 'good'; if(secs>300)return 'ok'; return 'bad'; }

// ── Render leaderboard ────────────────────────────────────────
function renderLeaderboard(lb, allTeams){
  document.getElementById('statTeams').textContent   = allTeams.length;
  document.getElementById('statComplete').textContent = lb.length;
  document.getElementById('statTop').textContent     = lb.length>0 ? lb[0].score : '—';

  const container = document.getElementById('tableContainer');

  if(lb.length===0 && allTeams.length===0){
    container.innerHTML='<div class="empty-state">AWAITING MISSION COMPLETIONS...<br><br>BE THE FIRST TO SECURE THE ANTIDOTE</div>';
    return;
  }

  const table=document.createElement('table');
  table.innerHTML=`<thead><tr>
    <th>RANK</th><th>TEAM</th><th>SCORE</th><th>TIME LEFT</th><th>HINTS</th><th>STATUS</th>
  </tr></thead>`;
  const tbody=document.createElement('tbody');

  lb.forEach((entry,i)=>{
    const tr=document.createElement('tr');
    if(i===0)tr.className='top-1'; else if(i===1)tr.className='top-2'; else if(i===2)tr.className='top-3';
    const rankCls=i<3?'r'+(i+1):'';
    tr.innerHTML=`
      <td><span class="rank-badge ${rankCls}">${i+1}</span></td>
      <td><div class="team-name-cell">${entry.teamName}</div><div class="school-name">${entry.school||''}</div></td>
      <td class="score-cell">${entry.score}</td>
      <td class="time-cell ${timeClass(entry.timeLeft||0)}">${fmtTime(entry.timeLeft||0)}</td>
      <td class="hints-cell" style="color:${(entry.hintsUsed||0)===0?'var(--neon-green)':'var(--text-dim)'}">${entry.hintsUsed||0}</td>
      <td><span class="status-badge complete">COMPLETE</span></td>
    `;
    tbody.appendChild(tr);
  });

  // Active teams not yet finished
  const completedIds = new Set(lb.map(e=>e.teamId));
  allTeams.filter(t=>t.active && !completedIds.has(t.teamId)).forEach(t=>{
    const tr=document.createElement('tr');
    tr.innerHTML=`
      <td><span class="rank-badge">—</span></td>
      <td><div class="team-name-cell">${t.teamName}</div><div class="school-name">${t.school||''}</div></td>
      <td class="score-cell" style="color:var(--text-dim)">${t.score||1000}</td>
      <td class="time-cell">—</td>
      <td class="hints-cell">—</td>
      <td><span class="status-badge active">IN PROGRESS</span></td>
    `;
    tbody.appendChild(tr);
  });

  table.appendChild(tbody);
  container.innerHTML='';
  container.appendChild(table);
}

// ── Real-time listeners ───────────────────────────────────────
let lbData    = [];
let teamsData = [];

// Leaderboard listener — sorted by score descending
onSnapshot(
  query(collection(db,'leaderboard'), orderBy('score','desc')),
  snap=>{
    lbData = snap.docs.map(d=>d.data());
    renderLeaderboard(lbData, teamsData);
  },
  err=>{ console.error('Leaderboard listener error:',err); }
);

// Teams listener
onSnapshot(
  collection(db,'teams'),
  snap=>{
    teamsData = snap.docs.map(d=>d.data());
    renderLeaderboard(lbData, teamsData);
  },
  err=>{ console.error('Teams listener error:',err); }
);

// Manual refresh button (listeners already auto-update, but keeps UX feel)
window.manualRefresh = function(){ renderLeaderboard(lbData, teamsData); };

window.addEventListener('resize',()=>{ canvas.width=window.innerWidth; canvas.height=window.innerHeight; });
</script>
</body>
</html>
